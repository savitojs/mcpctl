name: mcpctl tests and publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write  # Required for Trusted Publishing

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test CLI installation
        run: |
          mcpctl --help

      - name: Test basic functionality
        run: |
          mcpctl list

      - name: Run linting
        run: |
          pip install ruff black
          ruff check mcpctl/ || true
          black --check mcpctl/ || true
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## mcpctl ${{ github.ref_name }}

            Universal MCP Server Manager for Claude Code

            ### Installation

            ```bash
            pip install mcpctl
            ```

            Or install from GitHub:

            ```bash
            pip install git+https://github.com/${{ github.repository }}.git@${{ github.ref_name }}
            ```

            ### Usage

            ```bash
            mcpctl list                    # List all available MCP servers
            mcpctl enable github           # Enable an npm-based server
            mcpctl enable postgres         # Enable server and start container
            mcpctl status                  # Check server status
            mcpctl disable postgres        # Disable server and stop container
            ```

            ### What's New

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for detailed changes.

            ### Full Changelog

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v0.1.0...${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
